<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RETRO PLAYER</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16162e">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --body-color: #1a1a2e;
    --body-light: #16213e;
    --screen-bg: #0a0a12;
    --screen-border: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --accent3: #50fa7b;
    --text: #f8f8f2;
    --text-dim: #6272a4;
    --pixel: #e94560;
    --btn-a: #e94560;
    --btn-b: #f5a623;
    --btn-x: #50fa7b;
    --btn-y: #8be9fd;
    --dpad: #0d0d1a;
    --scanline: rgba(0,0,0,0.15);
    --glow: 0 0 10px rgba(233,69,96,0.5);
    --screen-glow: 0 0 20px rgba(80,250,123,0.15), 0 0 40px rgba(80,250,123,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    padding: 10px;
    overflow-x: hidden;
  }

  .console {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(160deg, #1e1e3a 0%, #16162e 50%, #1a1a30 100%);
    border-radius: 24px 24px 60px 60px;
    border: 2px solid #2a2a4a;
    box-shadow: 
      0 0 0 1px #0a0a18,
      0 8px 32px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -1px 0 rgba(0,0,0,0.3);
    padding: 16px 16px 28px;
    position: relative;
    user-select: none;
  }

  /* top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 10px;
  }
  .brand {
    font-size: 7px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: var(--glow);
  }
  .indicators {
    display: flex;
    gap: 5px;
  }
  .led {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 6px var(--accent3);
    animation: blink 2s ease-in-out infinite;
  }
  .led.orange { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation-delay: 0.5s; }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* screen */
  .screen-housing {
    background: #0a0a16;
    border-radius: 10px;
    padding: 6px;
    border: 2px solid #0d1a3a;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), var(--screen-glow);
    position: relative;
  }
  .screen {
    background: var(--screen-bg);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    height: 240px;
    display: flex;
    flex-direction: column;
  }

  /* scanlines overlay */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* NOW PLAYING view */
  .view {
    flex: 1;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    position: absolute;
    inset: 0;
    transition: opacity 0.2s;
  }
  .view.active {
    opacity: 1;
    pointer-events: all;
    position: relative;
  }

  /* Now Playing */
  .now-playing {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 10px;
  }
  .np-header {
    font-size: 6px;
    color: var(--accent);
    text-align: center;
    letter-spacing: 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1a1a2e;
    margin-bottom: 8px;
    animation: marquee-fade 1s ease;
  }
  .np-art {
    width: 80px; height: 80px;
    margin: 0 auto 8px;
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px rgba(233,69,96,0.4);
    position: relative;
    background: #111;
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .np-art canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  .np-art .spin-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .np-info {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }
  .np-title {
    font-size: 7px;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .np-title.scroll {
    animation: scroll-text 6s linear infinite;
    white-space: nowrap;
    display: inline-block;
  }
  @keyframes scroll-text {
    0% { transform: translateX(0); }
    30% { transform: translateX(0); }
    70% { transform: translateX(-60%); }
    100% { transform: translateX(0); }
  }
  .np-artist {
    font-size: 6px;
    color: var(--text-dim);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .np-track-num {
    font-size: 6px;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  /* progress */
  .progress-wrap {
    margin-top: auto;
  }
  .progress-bar-bg {
    height: 6px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    position: relative;
    cursor: pointer;
    margin-bottom: 4px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.5s linear;
    position: relative;
  }
  .progress-bar-fill::after {
    content: '◆';
    position: absolute;
    right: -4px;
    top: -5px;
    font-size: 8px;
    color: var(--accent2);
    line-height: 1;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 6px;
    color: var(--text-dim);
    font-family: 'VT323', monospace;
    font-size: 12px;
  }

  /* Playlist view */
  .playlist-view {
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .pl-header {
    font-size: 6px;
    color: var(--accent3);
    text-align: center;
    padding: 8px;
    border-bottom: 1px solid #1a2a1a;
    letter-spacing: 3px;
    flex-shrink: 0;
  }
  .pl-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    scrollbar-width: none;
  }
  .pl-list::-webkit-scrollbar { display: none; }
  .pl-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    font-size: 6px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
    border-left: 2px solid transparent;
  }
  .pl-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .pl-item.active {
    color: var(--accent2);
    border-left-color: var(--accent2);
    background: rgba(245,166,35,0.05);
  }
  .pl-item.playing {
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .pl-num { color: var(--text-dim); min-width: 14px; font-family: 'VT323', monospace; font-size: 14px; }
  .pl-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-dur { font-family: 'VT323', monospace; font-size: 12px; color: var(--text-dim); }
  .pl-arrow { color: var(--accent); font-size: 8px; }

  /* Visualizer view */
  .viz-view {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 8px;
  }
  .viz-header {
    font-size: 6px;
    color: var(--btn-y);
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 1px solid #1a1a3a;
    margin-bottom: 6px;
    letter-spacing: 3px;
    flex-shrink: 0;
  }
  .viz-canvas-wrap {
    flex: 1;
    position: relative;
    border: 1px solid #1a1a3a;
    background: #050510;
    min-height: 0;
  }
  #vizCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .viz-now {
    font-size: 6px;
    color: var(--text-dim);
    text-align: center;
    padding-top: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* no tracks state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
  }
  .empty-icon { font-size: 32px; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .empty-text { font-size: 6px; line-height: 1.8; }
  .empty-hint { font-size: 5px; color: var(--accent); animation: blink 1.5s step-end infinite; }

  /* buttons area */
  .controls-area {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    padding: 14px 8px 8px;
  }

  /* D-pad */
  .dpad {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    width: 88px;
    height: 88px;
    gap: 2px;
  }
  .dpad-btn {
    background: var(--dpad);
    border: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 10px;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: #2a2a4a;
    color: var(--text);
    transform: scale(0.9);
  }
  .dpad-center {
    background: #111128;
    border-radius: 50%;
    border: 1px solid #2a2a4a;
    cursor: default;
  }
  .dpad-up { grid-column: 2; grid-row: 1; border-radius: 4px 4px 0 0; }
  .dpad-left { grid-column: 1; grid-row: 2; border-radius: 4px 0 0 4px; }
  .dpad-right { grid-column: 3; grid-row: 2; border-radius: 0 4px 4px 0; }
  .dpad-down { grid-column: 2; grid-row: 3; border-radius: 0 0 4px 4px; }
  .dpad-center { grid-column: 2; grid-row: 2; }

  /* Center buttons */
  .center-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .system-btns {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .sys-btn {
    background: #111128;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    padding: 5px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .sys-btn:active, .sys-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 8px rgba(233,69,96,0.5);
  }
  .sys-btn.sel { border-color: var(--btn-y); }
  .sys-btn.sel.active { background: var(--btn-y); }

  .load-btn {
    background: #111128;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 5px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: var(--accent3);
    cursor: pointer;
    transition: all 0.1s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .load-btn:active { background: #1a2a1a; transform: scale(0.95); }

  /* ABXY */
  .abxy {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    width: 88px;
    height: 88px;
    gap: 2px;
  }
  .action-btn {
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: rgba(0,0,0,0.8);
    font-weight: bold;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    box-shadow: 0 3px 0 rgba(0,0,0,0.4);
  }
  .action-btn:active, .action-btn.pressed {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.4);
  }
  .btn-y { grid-column: 1; grid-row: 2; background: var(--btn-y); }
  .btn-x { grid-column: 2; grid-row: 1; background: var(--btn-x); }
  .btn-a { grid-column: 3; grid-row: 2; background: var(--btn-a); }
  .btn-b { grid-column: 2; grid-row: 3; background: var(--btn-b); }

  /* bottom grip */
  .bottom-grip {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding-top: 12px;
  }
  .grip-dot {
    width: 4px; height: 4px;
    background: #2a2a4a;
    border-radius: 50%;
  }

  /* volume bar */
  .vol-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px 0;
  }
  .vol-label { font-size: 5px; color: var(--text-dim); }
  .vol-bar {
    flex: 1;
    height: 4px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    position: relative;
    cursor: pointer;
  }
  .vol-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--btn-y), var(--accent3));
    width: 80%;
  }
  .vol-val { font-size: 5px; color: var(--accent3); font-family: 'VT323', monospace; font-size: 12px; min-width: 20px; }

  /* pixel art generator */
  .pixel-art {
    image-rendering: pixelated;
  }

  /* notifications */
  .notif {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(233,69,96,0.9);
    color: white;
    font-size: 6px;
    padding: 4px 8px;
    border-radius: 2px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .notif.show { opacity: 1; }

  /* Responsive adjustments */
  @media (max-height: 700px) {
    .screen { height: 200px; }
    .np-art { width: 60px; height: 60px; }
    .dpad, .abxy { width: 72px; height: 72px; }
  }
</style>
</head>
<body>

<div class="console">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="brand">★ RETRO PLAYER</span>
    <div class="indicators">
      <div class="led"></div>
      <div class="led orange"></div>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen-housing">
    <div class="screen" id="screen">
      <!-- Now Playing View -->
      <div class="view active" id="view-nowplaying">
        <div class="now-playing" id="nowPlayingContent">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🎮</div>
            <div class="empty-text">NENHUMA FAIXA<br>CARREGADA</div>
            <div class="empty-hint">▶ PRESS SELECT</div>
          </div>
          <div id="trackContent" style="display:none; display:flex; flex-direction:column; height:100%;">
            <div class="np-header">♪ NOW PLAYING ♪</div>
            <div class="np-art">
              <canvas id="artCanvas" width="40" height="40"></canvas>
            </div>
            <div class="np-info">
              <div class="np-track-num" id="trackNum">1/1</div>
              <div style="overflow:hidden; width:100%;">
                <div class="np-title" id="npTitle">---</div>
              </div>
              <div class="np-artist" id="npArtist">UNKNOWN</div>
            </div>
            <div class="progress-wrap">
              <div class="progress-bar-bg" id="progressBg">
                <div class="progress-bar-fill" id="progressFill"></div>
              </div>
              <div class="time-row">
                <span id="timeCurrent">0:00</span>
                <span id="timeTotal">0:00</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Playlist View -->
      <div class="view" id="view-playlist">
        <div class="playlist-view">
          <div class="pl-header">▶ PLAYLIST</div>
          <div class="pl-list" id="plList">
            <div class="empty-state">
              <div class="empty-icon">📂</div>
              <div class="empty-text">CARREGUE MÚSICAS<br>COM SELECT</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Visualizer View -->
      <div class="view" id="view-viz">
        <div class="viz-view">
          <div class="viz-header">◈ VISUALIZER ◈</div>
          <div class="viz-canvas-wrap">
            <canvas id="vizCanvas"></canvas>
          </div>
          <div class="viz-now" id="vizNow">---</div>
        </div>
      </div>

      <!-- Notification -->
      <div class="notif" id="notif"></div>
    </div>
  </div>

  <!-- Volume -->
  <div class="vol-bar-wrap">
    <span class="vol-label">VOL</span>
    <div class="vol-bar" id="volBar">
      <div class="vol-fill" id="volFill"></div>
    </div>
    <span class="vol-val" id="volVal">80</span>
  </div>

  <!-- Controls -->
  <div class="controls-area">
    <!-- D-pad -->
    <div class="dpad">
      <div class="dpad-btn dpad-up" id="dpadUp">▲</div>
      <div class="dpad-btn dpad-left" id="dpadLeft">◀</div>
      <div class="dpad-center dpad-btn"></div>
      <div class="dpad-btn dpad-right" id="dpadRight">▶</div>
      <div class="dpad-btn dpad-down" id="dpadDown">▼</div>
    </div>

    <!-- Center -->
    <div class="center-btns">
      <div class="system-btns">
        <button class="sys-btn" id="btnSel" onclick="openFilePicker()">SEL</button>
        <button class="sys-btn sel" id="btnStart" onclick="togglePlay()">START</button>
      </div>
      <div class="load-btn" onclick="openFilePicker()">+ LOAD FILES</div>
    </div>

    <!-- ABXY -->
    <div class="abxy">
      <button class="action-btn btn-y" id="btnY" title="Visualizer" onclick="switchView('viz')">Y</button>
      <button class="action-btn btn-x" id="btnX" title="Playlist" onclick="switchView('playlist')">X</button>
      <button class="action-btn btn-a" id="btnA" title="Play/Pause" onclick="togglePlay()">A</button>
      <button class="action-btn btn-b" id="btnB" title="Now Playing" onclick="switchView('nowplaying')">B</button>
    </div>
  </div>

  <!-- Button legend -->
  <div style="display:flex; justify-content:center; gap:12px; padding: 0 8px 4px;">
    <span style="font-size:5px; color:var(--text-dim)">A=PLAY</span>
    <span style="font-size:5px; color:var(--text-dim)">B=NOW</span>
    <span style="font-size:5px; color:var(--btn-x)">X=LIST</span>
    <span style="font-size:5px; color:var(--btn-y)">Y=VIZ</span>
  </div>

  <div class="bottom-grip">
    <div class="grip-dot"></div><div class="grip-dot"></div><div class="grip-dot"></div>
    <div class="grip-dot"></div><div class="grip-dot"></div>
  </div>
</div>

<input type="file" id="fileInput" accept="audio/*" multiple style="display:none">

<script>
const audio = new Audio();
let tracks = [];
let currentIndex = 0;
let isPlaying = false;
let audioCtx = null;
let analyser = null;
let source = null;
let volume = 0.8;
let vizAnimFrame = null;
let currentView = 'nowplaying';

// File input
document.getElementById('fileInput').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  
  files.forEach(f => {
    tracks.push({ file: f, name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f), duration: 0 });
  });
  
  updatePlaylist();
  if (tracks.length === files.length) {
    loadTrack(0);
    showNotif('▶ ' + files.length + ' FAIXA(S)');
  }
  e.target.value = '';
});

function openFilePicker() {
  document.getElementById('fileInput').click();
}

function loadTrack(idx) {
  currentIndex = idx;
  const t = tracks[idx];
  audio.src = t.url;
  audio.volume = volume;
  
  // Setup Web Audio for visualizer
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    } catch(e) {}
  }
  
  audio.addEventListener('loadedmetadata', () => {
    t.duration = audio.duration;
    updateNowPlaying();
    updatePlaylist();
  }, { once: true });
  
  updateNowPlaying();
  updatePlaylist();
  drawPixelArt(idx);
  
  if (isPlaying) {
    audio.play().catch(()=>{});
  }
}

function togglePlay() {
  if (!tracks.length) { openFilePicker(); return; }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('btnStart').classList.remove('active');
    document.getElementById('btnA').style.opacity = '0.7';
  } else {
    audio.play().catch(()=>{});
    isPlaying = true;
    document.getElementById('btnStart').classList.add('active');
    document.getElementById('btnA').style.opacity = '1';
  }
}

function nextTrack() {
  if (!tracks.length) return;
  currentIndex = (currentIndex + 1) % tracks.length;
  loadTrack(currentIndex);
  if (isPlaying) audio.play().catch(()=>{});
  flashBtn('dpadRight');
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
  loadTrack(currentIndex);
  if (isPlaying) audio.play().catch(()=>{});
  flashBtn('dpadLeft');
}

audio.addEventListener('ended', () => {
  nextTrack();
});

audio.addEventListener('timeupdate', () => {
  if (!tracks.length) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCurrent').textContent = fmtTime(audio.currentTime);
  document.getElementById('timeTotal').textContent = fmtTime(audio.duration);
});

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2,'0');
}

function updateNowPlaying() {
  if (!tracks.length) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('trackContent').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('trackContent').style.display = 'flex';
  
  const t = tracks[currentIndex];
  const titleEl = document.getElementById('npTitle');
  titleEl.textContent = t.name;
  titleEl.classList.toggle('scroll', t.name.length > 18);
  document.getElementById('npArtist').textContent = 'TRACK ' + String(currentIndex + 1).padStart(2,'0');
  document.getElementById('trackNum').textContent = (currentIndex+1) + '/' + tracks.length;
  document.getElementById('vizNow').textContent = t.name;
}

function updatePlaylist() {
  const list = document.getElementById('plList');
  if (!tracks.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">CARREGUE MÚSICAS<br>COM SELECT</div></div>';
    return;
  }
  list.innerHTML = tracks.map((t, i) => `
    <div class="pl-item ${i === currentIndex ? (isPlaying ? 'playing' : 'active') : ''}" onclick="playFromList(${i})">
      <span class="pl-num">${String(i+1).padStart(2,'0')}</span>
      ${i === currentIndex ? '<span class="pl-arrow">▶</span>' : ''}
      <span class="pl-name">${t.name}</span>
      <span class="pl-dur">${fmtTime(t.duration)}</span>
    </div>
  `).join('');
  
  // scroll active into view
  const active = list.querySelector('.playing, .active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function playFromList(idx) {
  loadTrack(idx);
  isPlaying = true;
  document.getElementById('btnStart').classList.add('active');
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audio.play().catch(()=>{});
  switchView('nowplaying');
}

function switchView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  
  if (name === 'viz') {
    startViz();
  } else {
    stopViz();
  }
}

// Progress bar click
document.getElementById('progressBg').addEventListener('click', (e) => {
  if (!tracks.length || !audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// Volume bar
document.getElementById('volBar').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = volume;
  document.getElementById('volFill').style.width = (volume*100) + '%';
  document.getElementById('volVal').textContent = Math.round(volume*100);
});

// D-pad controls
document.getElementById('dpadRight').addEventListener('click', nextTrack);
document.getElementById('dpadLeft').addEventListener('click', prevTrack);
document.getElementById('dpadUp').addEventListener('click', () => {
  volume = Math.min(1, volume + 0.1);
  audio.volume = volume;
  document.getElementById('volFill').style.width = (volume*100) + '%';
  document.getElementById('volVal').textContent = Math.round(volume*100);
  flashBtn('dpadUp');
});
document.getElementById('dpadDown').addEventListener('click', () => {
  volume = Math.max(0, volume - 0.1);
  audio.volume = volume;
  document.getElementById('volFill').style.width = (volume*100) + '%';
  document.getElementById('volVal').textContent = Math.round(volume*100);
  flashBtn('dpadDown');
});

function flashBtn(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 150);
}

// Pixel art album cover generator
function drawPixelArt(idx) {
  const canvas = document.getElementById('artCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  
  // deterministic seed from track index
  const seed = idx * 1234567 + 89;
  const rng = (n) => { 
    let x = Math.sin(seed + n) * 10000;
    return x - Math.floor(x);
  };
  
  const palettes = [
    ['#e94560','#f5a623','#0a0a12','#1a1a2e','#50fa7b'],
    ['#8be9fd','#50fa7b','#0a0a12','#1a1a2e','#f5a623'],
    ['#ff79c6','#bd93f9','#0a0a12','#1a1a2e','#50fa7b'],
    ['#50fa7b','#f5a623','#0a0a12','#1a1a2e','#8be9fd'],
  ];
  const pal = palettes[idx % palettes.length];
  
  ctx.fillStyle = pal[3];
  ctx.fillRect(0, 0, w, h);
  
  const ps = 2; // pixel size
  for (let y = 0; y < h; y += ps) {
    for (let x = 0; x < w; x += ps) {
      const v = rng(x * 100 + y);
      if (v < 0.15) { ctx.fillStyle = pal[0]; ctx.fillRect(x, y, ps, ps); }
      else if (v < 0.22) { ctx.fillStyle = pal[1]; ctx.fillRect(x, y, ps, ps); }
      else if (v < 0.28) { ctx.fillStyle = pal[4]; ctx.fillRect(x, y, ps, ps); }
    }
  }
  
  // draw a little sprite shape
  const cx = Math.floor(w/2), cy = Math.floor(h/2);
  const shape = idx % 3;
  ctx.fillStyle = pal[0];
  if (shape === 0) {
    // music note shape
    for (let [px, py] of [[0,0],[0,1],[0,2],[0,3],[1,3],[2,3],[2,2],[2,1],[1,0]]) {
      ctx.fillRect((cx-1+px)*ps, (cy-2+py)*ps, ps, ps);
    }
  } else if (shape === 1) {
    // diamond
    for (let [px, py] of [[1,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2],[1,3]]) {
      ctx.fillRect((cx-1+px)*ps, (cy-2+py)*ps, ps, ps);
    }
  } else {
    // star ish
    for (let [px, py] of [[1,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2],[0,3],[2,3]]) {
      ctx.fillRect((cx-1+px)*ps, (cy-2+py)*ps, ps, ps);
    }
  }
}

// Visualizer
function startViz() {
  if (vizAnimFrame) cancelAnimationFrame(vizAnimFrame);
  const canvas = document.getElementById('vizCanvas');
  const ctx = canvas.getContext('2d');
  
  function draw() {
    vizAnimFrame = requestAnimationFrame(draw);
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    canvas.width = w; canvas.height = h;
    
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, w, h);
    
    if (!analyser || !isPlaying) {
      // idle animation
      const t = Date.now() / 1000;
      const bars = 20;
      for (let i = 0; i < bars; i++) {
        const bh = (Math.sin(t * 2 + i * 0.5) * 0.5 + 0.5) * (h * 0.3) + 2;
        const x = (i / bars) * w;
        const bw = (w / bars) - 1;
        ctx.fillStyle = i % 3 === 0 ? '#e94560' : i % 3 === 1 ? '#f5a623' : '#50fa7b';
        ctx.fillRect(x, h - bh, bw, bh);
      }
      return;
    }
    
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    
    const bars = data.length;
    const bw = Math.floor(w / bars);
    
    for (let i = 0; i < bars; i++) {
      const v = data[i] / 255;
      const bh = Math.max(2, v * h);
      const x = i * bw;
      
      // pixel art style - round to blocks
      const blockH = Math.ceil(bh / 4) * 4;
      
      const colors = ['#e94560', '#f5a623', '#50fa7b', '#8be9fd'];
      ctx.fillStyle = colors[Math.floor(v * 3)];
      
      // draw in blocks
      for (let y = h; y > h - blockH; y -= 4) {
        ctx.fillRect(x + 1, y - 4, bw - 1, 3);
      }
    }
    
    // scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let y = 0; y < h; y += 4) {
      ctx.fillRect(0, y, w, 1);
    }
  }
  draw();
}

function stopViz() {
  if (vizAnimFrame) {
    cancelAnimationFrame(vizAnimFrame);
    vizAnimFrame = null;
  }
}

// Notifications
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// draw default art
drawPixelArt(0);
</script>
